[build]
  command   = "npm run build"
  functions = "netlify/functions"
  publish   = "dist"

# Markdown-for-agents edge function.
# Runs on every content page and, when a client sends `Accept: text/markdown`,
# returns a Markdown rendering of the page (~80% fewer tokens than the HTML).
# It is registered on all paths and narrowed with `excludedPath`, which lists
# the utility routes, API endpoints, and asset paths that must never be
# converted. To stop converting a path, add it to `excludedPath`; to convert it
# again, remove it. See netlify/edge-functions/markdown.ts for full docs.
[[edge_functions]]
  function = "markdown"
  path = "/*"
  excludedPath = [
    # Utility / form / dashboard routes (no meaningful article content)
    "/apply",
    "/quote",
    "/todos",
    "/pipeline",
    # API endpoints
    "/.netlify/*",
    "/api/*",
    # Build output, public assets, and crawler/static files
    "/assets/*",
    "/images/*",
    "/blog-images/*",
    "/card-banners/*",
    "/logos/*",
    "/favicons/*",
    "/trust-seals/*",
    "/*.js",
    "/*.css",
    "/*.json",
    "/*.xml",
    "/*.txt",
    "/*.csv",
    "/*.svg",
    "/*.png",
    "/*.jpg",
    "/*.jpeg",
    "/*.webp",
    "/*.webm",
    "/*.ico",
    "/*.woff",
    "/*.woff2"
  ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self' https://*.supabase.co https://signup.nmi.com https://secure.nmi.com; frame-ancestors 'none'"
